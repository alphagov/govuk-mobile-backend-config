name: Fastly Purge Integration

on:
  workflow_dispatch:

jobs:
  purge-integration:
    runs-on: ubuntu-latest

    steps:
      - name: Get Secrets
        uses: bitwarden/sm-action@14f92f1d294ae3c2b6a3845d389cd2c318b0dfd8 # pin@v2.2.0
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            c90b9732-8884-4e56-ab81-b40800c99531 > FASTLY_API_TOKEN

      - name: Purge Fastly Cache
        run: |
          echo "$(curl -i -X POST "https://api.fastly.com/service/kQylaJgw7xB99LJqxlLv42/purge_all" \
          -H "Fastly-Key: $FASTLY_API_TOKEN" \
          -H "Accept: application/json")"
